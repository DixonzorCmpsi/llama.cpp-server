services:
  # --------------------------------------------------------------------------
  # 1. THE AI INFERENCE ENGINE (HIDDEN FROM HOST)
  # --------------------------------------------------------------------------
  ai-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-ai-api
    restart: unless-stopped
    # Notice: No 'ports' mapping here.
    # The Windows host cannot directly access port 8080.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./model_cache:/models
    command: >
      --models-dir /models
      --ctx-size 8192
      --n-gpu-layers 999
      --models-max 3
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --defrag-thold 0.1
      --parallel 2

  # --------------------------------------------------------------------------
  # 2. THE SECURITY GATEWAY (EXPOSED TO HOST)
  # --------------------------------------------------------------------------
  api-gateway:
    image: nginx:alpine
    container_name: local-ai-gateway
    restart: unless-stopped
    ports:
      # This binds Nginx's internal port 80 to your Windows host's port 80
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./auth_keys.conf:/etc/nginx/auth_keys.conf:ro
    depends_on:
      - ai-server

  # --------------------------------------------------------------------------
  # 3. THE CLOUDFLARE TUNNEL
  # Requires CF_TUNNEL_TOKEN in .env (copy .env.example → .env)
  # Configure the tunnel's public hostname in the Cloudflare dashboard:
  #   Zero Trust → Networks → Tunnels → your tunnel → Public Hostnames
  #   Service: http://api-gateway:80
  # --------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: local-ai-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - api-gateway
