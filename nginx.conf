events {
    worker_connections 1024;
}

http {
    map_hash_bucket_size 128;

    # API keys are loaded from auth_keys.conf (gitignored, never committed).
    # Copy auth_keys.conf.example to auth_keys.conf and add your real keys.
    map $http_authorization $is_authorized {
        default 0;
        include /etc/nginx/auth_keys.conf;
    }

    server {
        listen 80;
        default_type application/json;

        location / {
            # 1. Enforce API Key Authorization
            if ($is_authorized = 0) {
                return 401 '{"error": {"message": "Unauthorized: Invalid or missing API Key", "type": "invalid_request_error"}}';
            }

            # 2. Proxy the authorized request to the AI server
            proxy_pass http://ai-server:8080;

            # 3. Preserve client information for your logs
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 4. Disable buffering for real-time token streaming (crucial for AI chat interfaces)
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}
